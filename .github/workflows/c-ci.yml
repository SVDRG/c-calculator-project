name: C Calculator CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # ПјКЛ РЬЙЬСі АцЗЮ (ДыЙЎРк ЦїЧд АЁДЩ)
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/c-calculator-project
  DEPLOY_PATH: C:\deploy\c-calculator-project

jobs:
  build-test-publish:
    name: Build, Test, Publish
    runs-on: ubuntu-latest
    outputs:
      image_lower: ${{ steps.prep.outputs.image_lower }}
    steps:
      - name: Prepare Lowercase Image Name
        id: prep
        run: |
          # РЬЙЬСі РЬИЇРЛ МвЙЎРкЗЮ КЏШЏЧЯПЉ ШЏАц КЏМіПЭ OutputПЁ РњРх
          IMAGE_LOWER=$(echo "${{ env.IMAGE_BASE }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_LOWER=$IMAGE_LOWER" >> $GITHUB_ENV
          echo "image_lower=$IMAGE_LOWER" >> $GITHUB_OUTPUT

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make

      - name: Build project
        run: make

      - name: Run tests
        run: make test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # github.actorПЭ GITHUB_TOKENРЛ ЛчПыЧЯИщ КАЕЕ Secret МГСЄ ОјРЬЕЕ ЦаХАСі БЧЧбРЬ РлЕПЧеДЯДй.
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_LOWER }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on Windows self-hosted runner
    needs: build-test-publish
    runs-on: [self-hosted, Windows, X64]
    env:
      # РЬРќ JobПЁМ­ ГбАмСи МвЙЎРк РЬЙЬСі РЬИЇРЛ ШЏАц КЏМіЗЮ ЕюЗЯ
      IMAGE_NAME_LOWER: ${{ needs.build-test-publish.outputs.image_lower }}

    steps:
      - name: Show runner info
        shell: pwsh
        run: |
          Write-Host "Runner is working"
          hostname
          whoami
          $PSVersionTable.PSVersion

      - name: Check Docker
        shell: pwsh
        run: |
          docker --version
          docker compose version
          docker ps

      - name: Log in to GHCR on deployment server
        shell: pwsh
        run: |
          # ПЉБтМ­ЕЕ github.actorПЭ GITHUB_TOKENРЛ ЛчПыЧЯАХГЊ БтСИ SecretРЛ ЛчПыЧЯММПф.
          $pat = "${{ secrets.GITHUB_TOKEN }}"
          $user = "${{ github.actor }}"

          $pat | docker login ghcr.io -u $user --password-stdin

      - name: Prepare deployment directory
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          if (!(Test-Path $deployPath)) {
            New-Item -ItemType Directory -Force -Path $deployPath | Out-Null
          }
          Write-Host "Deployment path: $deployPath"

      - name: Create docker-compose.yml
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          $composeFile = Join-Path $deployPath "docker-compose.yml"

          # РЬЙЬСі РЬИЇРЛ ЙнЕхНУ МвЙЎРк КЏМі(${{ env.IMAGE_NAME_LOWER }})ЗЮ Л§МК
          @"
          services:
            c-calculator:
              image: ${{ env.IMAGE_NAME_LOWER }}:latest
              container_name: c-calculator-prod
              stdin_open: true
              tty: true
              restart: unless-stopped
          "@ | Set-Content -Path $composeFile -Encoding UTF8

          Write-Host "docker-compose.yml created with lowercase image name:"
          Get-Content $composeFile

      - name: Pull latest image
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          Set-Location $deployPath
          # КЏШЏЕШ РЬЙЬСі РЬИЇРЬ ЦїЧдЕШ docker-compose.ymlРЛ ЛчПыЧЯПЉ pull МіЧр
          docker compose pull

      - name: Deploy container
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          Set-Location $deployPath
          docker compose up -d

      - name: Verify deployment
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          Set-Location $deployPath
          docker compose ps
          # РЬЙЬСі АЫЛі НУПЁЕЕ МвЙЎРк РЬИЇРИЗЮ АЫЛі
          docker images | Select-String "c-calculator-project"
          docker logs c-calculator-prod --tail 50


